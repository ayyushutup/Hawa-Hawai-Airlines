version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hawa_hawai_db
    restart: always
    environment:
      POSTGRES_USER: hawa_user
      POSTGRES_PASSWORD: hawa_password
      POSTGRES_DB: hawa_hawai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hawa_user -d hawa_hawai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
