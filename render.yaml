services:
  # Backend Web Service
  - type: web
    name: hawa-hawai-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    rootDir: backend
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: hawa-hawai-db
          property: connectionString
      - key: FLASK_DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"

databases:
  # PostgreSQL Database
  - name: hawa-hawai-db
    region: singapore
    plan: free
